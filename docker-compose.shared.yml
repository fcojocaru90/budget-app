# /data/docker/docker-compose.shared.yml
services:
  postgres:
    image: postgres:16
    container_name: budget-postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - /data/docker/postgres:/var/lib/postgresql/data
      - ./init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    ports:
      - "192.168.1.3:5432:5432"
    networks:
      - budget-dev
      - budget-staging
    mem_limit: 4g
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: budget-redis
    restart: unless-stopped
    volumes:
      - /data/docker/redis:/data
    ports:
      - "192.168.1.3:6379:6379"
    networks:
      - budget-dev
      - budget-staging
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  budget-dev:
    external: true
  budget-staging:
    external: true
